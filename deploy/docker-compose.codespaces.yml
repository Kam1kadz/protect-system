version: "3.9"

networks:
  kmguard-dev:
    driver: bridge

volumes:
  postgres_dev:
  redis_dev:
  minio_dev:

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [kmguard-dev]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       kmguard
      POSTGRES_USER:     kmguard
      POSTGRES_PASSWORD: kmguard_dev
    volumes:
      - postgres_dev:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U kmguard -d kmguard"]
      interval: 3s
      timeout:  3s
      retries:  15

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [kmguard-dev]
    ports:
      - "6379:6379"
    command: redis-server --requirepass kmguard_redis
    healthcheck:
      test:    ["CMD", "redis-cli", "-a", "kmguard_redis", "ping"]
      interval: 3s
      timeout:  3s
      retries:  10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    networks: [kmguard-dev]
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     kmguardadmin
      MINIO_ROOT_PASSWORD: kmguardminio123
    volumes:
      - minio_dev:/data