version: "3.9"

# Production overrides — запускать так:
# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  postgres:
    deploy:
      resources:
        limits:
          memory: 1g

  public:
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  site:
    deploy:
      resources:
        limits:
          memory: 512m

  minio:
    environment:
      MINIO_BROWSER: "off"